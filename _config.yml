title: ~ Pages GitHub de Machou ~
lang: fr_FR
subtitle: by HTML5 UP
description: Un site web static généré via GitHub Pages
remote_theme: "mmistakes/jekyll-theme-basically-basic@1.4.5"
theme: jekyll-theme-basically-basic
markdown: kramdown
#baseurl: le sous-chemin facultatif du site, par exemple "/blog".
url: https//machou.github.io/
#logo: logo du site, exemple : "/assets/images/logo.png"
#search: # true, false (default)
#search_full_content: false # true, false (default)
#search_provider: # lunr (default), algolia

plugins: # previsously gems
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
feed:
  path: atom.xml
# Pagination - https://jekyllrb.com/docs/pagination/
paginate: 10
paginate_path: /page:num/

show_downloads: false
#google_analytics:

# auteur
author:
  name: Machou
#  twitter:
#  picture:
#twitter_username:
github_username: Machou
email: lorem@github.com
street_address: 1337 rue du Geek
city: Random Ville
state: N/A
zip_code: 12345
country: France
phone: (+33) 3 25 85 41 52

socials:
  GitHub: https://github.com/Machou
  GitLab:
  Google-Plus:
  Instagram:
  LinkedIn:
  Twitter:
  Facebook:
  Slack:

sass:
  style: compressed

exclude:
- "*.gemspec"
- LICENSE.md
- CONTRIBUTING.md
